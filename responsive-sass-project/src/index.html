<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Project</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">TechBrand</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-section bg-light">
    <div class="container">
      <h1>Build Faster</h1>
      <p>Create modern websites with Bootstrap + SASS.</p>
      <button class="btn btn-primary">Get Started</button>
    </div>
  </section>

  <!-- Features -->
  <section class="py-5">
    <div class="container">
      <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card feature-card p-3">
            <h3>Mobile</h3>
            <p>Optimized for smartphones.</p>
          </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <div class="card feature-card p-3">
            <h3>Tablet</h3>
            <p>Perfect tablet layouts.</p>
          </div>
        </div>

        <div class="col-12 col-md-12 col-lg-4">
          <div class="card feature-card p-3">
            <h3>Desktop</h3>
            <p>Wide-screen support.</p>
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
